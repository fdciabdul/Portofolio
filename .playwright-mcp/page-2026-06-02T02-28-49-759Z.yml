            - heading "What it does" [level=2] [ref=e91]
            - list [ref=e92]:
              - listitem [ref=e93]: Scans the Projects.co.id listing on a schedule, filtered by your keywords.
              - listitem [ref=e94]: Auto-generates a bid message in your voice with Grok.
              - listitem [ref=e95]: Solves the captcha via Grok Vision.
              - listitem [ref=e96]: Submits the bid through a TLS-impersonated client that gets through Cloudflare.
              - listitem [ref=e97]: Persists which projects it has already bid on, with per-day and per-cycle caps.
              - listitem [ref=e98]: Renders a live dashboard in the terminal so you can watch it work.
            - complementary "Related articles" [ref=e99]:
