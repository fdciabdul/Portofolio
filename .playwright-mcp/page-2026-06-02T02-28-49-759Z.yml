                - generic [ref=e106]: Driver Booster Pro - Open Source Windows Driver Manager Built with Go
            - heading "Configuration" [level=2] [ref=e107]
            - paragraph [ref=e108]: Everything is driven by a single JSON config — no flag soup.
            - code [ref=e110]: "{ \"keywords\": [\"scrap\", \"scraping\", \"automation\", \"bot\", \"web\"], \"pollIntervalMs\": 600000, \"jitterMs\": 120000, \"maxBidsPerCycle\": 3, \"maxBidsPerDay\": 25, \"pagesPerKeyword\": 2, \"minBudget\": 500000, \"skipIfBidsOver\": 30, \"delayMs\": 15000, \"captchaRetries\": 3, \"stateFile\": \".auto-bid-state.json\", \"tui\": true, \"dryRun\": false }"
            - heading "Run" [level=2] [ref=e111]
            - code [ref=e113]: npm run dev -- auto-bid-daemon
