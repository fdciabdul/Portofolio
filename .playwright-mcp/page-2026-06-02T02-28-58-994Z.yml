            - paragraph [ref=e285]: Real example of how building offline-first forced cleaner engineering.
            - paragraph [ref=e286]:
              - text: When I tested the SQLi scanner against my own vuln lab (
              - code [ref=e287]: https://insecure.newploit.com/profile.php?id=1
              - text: ), the scan correctly detected error-based injection but
              - strong [ref=e288]: missed UNION-based
              - text: every time. Even though I could prove UNION worked manually with curl.
            - paragraph [ref=e289]: "Looked at the scanner code:"
            - generic [ref=e290]:
              - generic [ref=e296]: Rust
              - code [ref=e297]: "// test_union_based() — old version let full = format!(\"{}{} UNION SELECT {}-- -\", point.base_value, prefix, fields.join(\",\"));"
              - button "Copy" [ref=e298] [cursor=pointer]
            - paragraph [ref=e299]:
              - text: "Spotted it: the scanner used the"
              - strong [ref=e300]:
                - text: original
                - code [ref=e301]: base_value
                - text: (
                - code [ref=e302]: "1"
                - text: )
              - text: "when injecting UNION. The PHP target was running this query:"
            - generic [ref=e303]:
              - generic [ref=e309]: SQL
              - code [ref=e310]: SELECT id, user, ... FROM users WHERE id=1 UNION SELECT marker,...
              - button "Copy" [ref=e311] [cursor=pointer]
            - paragraph [ref=e312]:
              - text: The DB returned
              - strong [ref=e313]: two rows
              - text: ": the real user (id=1)"
              - strong [ref=e314]: first
              - text: ", then the UNION row. PHP's"
              - code [ref=e315]: fetch_assoc()
              - text: only returned the first row. The marker was never rendered → scanner thought UNION failed.
            - paragraph [ref=e316]: "The fix is a classic sqlmap technique:"
            - generic [ref=e317]:
              - generic [ref=e323]: Rust
              - code [ref=e324]:
                - text: let null_bases = if base_value.chars().all(
                - generic [ref=e325]: "|c|"
                - text: "c.is_ascii_digit()) { vec![format!(\"-{}\", base_value), \"0\".into(), \"999999999\".into(), format!(\"{} AND 1=2\", base_value)] } else { vec![format!(\"{} AND 1=2\", base_value)] };"
              - button "Copy" [ref=e326] [cursor=pointer]
            - paragraph [ref=e327]:
              - text: Use
              - code [ref=e328]: "-1"
              - text: ","
              - code [ref=e329]: "0"
              - text: ", or"
              - code [ref=e330]: AND 1=2
              - text: to make the original
              - code [ref=e331]: WHERE
              - text: clause return zero rows. Now the UNION row is the only row, and the marker reflects.
