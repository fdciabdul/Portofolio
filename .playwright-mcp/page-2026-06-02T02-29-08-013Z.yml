            - text: ", and the Win32 API tricks that made it feel truly native."
            - paragraph
            - generic [ref=e118]:
              - heading "Download Driver Booster Pro" [level=3] [ref=e119]
              - paragraph [ref=e120]: Windows 10/11 • Portable EXE • No installer required
              - link "Download EXE" [ref=e121] [cursor=pointer]:
