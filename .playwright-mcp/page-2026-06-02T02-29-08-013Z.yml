            - img "Driver Booster Pro - Main Dashboard"
            - heading "Why Go + WebView2?" [level=2] [ref=e123]
            - paragraph [ref=e124]: "I wanted a few things from this project:"
            - list [ref=e125]:
              - listitem [ref=e126]:
                - strong [ref=e127]: Single binary
                - text: — no installer, no runtime dependencies to bundle
              - listitem [ref=e128]:
                - strong [ref=e129]: Web-tech UI
                - text: — HTML/CSS/JS because I know it and it's flexible
              - listitem [ref=e130]:
                - strong [ref=e131]: Native feel
                - text: — no Electron bloat, no obvious web view chrome
              - listitem [ref=e132]:
                - strong [ref=e133]: Full Win32 access
                - text: — for driver enumeration, Windows Update, system info
            - paragraph [ref=e134]:
              - text: Go + WebView2 hits the sweet spot.
              - code [ref=e135]: go-webview2
              - text: by
              - link "jchv" [ref=e136] [cursor=pointer]:
                - /url: https://github.com/jchv/go-webview2
              - text: wraps the Microsoft Edge WebView2 runtime, which is pre-installed on Windows 10+. The final binary is ~10 MB — compared to 150+ MB for an Electron app.
            - complementary "Related articles" [ref=e137]:
              - generic [ref=e139]: You may also like
              - 'link "GoAMPP: A 7 MB Native Windows Web Stack That Skips Docker, WSL, and the Java JDK" [ref=e142] [cursor=pointer]':
                - /url: /goampp-a-7-mb-native-windows-web-stack-that-skips-docker-wsl-and-the-java-jdk
                - generic [ref=e144]: "GoAMPP: A 7 MB Native Windows Web Stack That Skips Docker, WSL, and the Java JDK"
            - heading "The Architecture" [level=2] [ref=e145]
            - paragraph [ref=e146]: "The app is structured as a local HTTP server + WebView2 client:"
            - code [ref=e148]: ┌─────────────────────────────────────┐ │ WebView2 Window (HTML/CSS/JS UI) │ │ ▲ │ │ │ fetch('/api/drivers') │ │ ▼ │ │ Local HTTP Server (Go) │ │ │ │ │ ▼ │ │ PowerShell / Win32 API calls │ └─────────────────────────────────────┘
            - paragraph [ref=e149]:
              - text: On startup, Go spins up an HTTP server on
              - code [ref=e150]: 127.0.0.1:0
              - text: (random free port), serves the
              - link "embedded" [ref=e151] [cursor=pointer]:
                - /url: /espforge-visual-tool-for-esphome-yaml-with-41-boards-and-99-components
              - text: UI assets, and hands the URL to WebView2. The frontend calls
              - code [ref=e152]: /api/*
              - text: endpoints that execute Windows operations on the backend.
            - heading "Embedding the Entire UI in the EXE" [level=2] [ref=e153]
            - paragraph [ref=e154]:
              - text: Go 1.16+ has
              - code [ref=e155]: embed
              - text: "built-in. One line pulls every UI file into the binary:"
            - code [ref=e157]: "//go:embed ui/* var uiFS embed.FS func main() { uiContent, _ := fs.Sub(uiFS, \"ui\") mux.Handle(\"/\", http.FileServer(http.FS(uiContent))) // ... }"
            - paragraph [ref=e158]: HTML, CSS, JS, and 27 PNG icons — all compiled into the EXE. Ship one file, no asset folders.
            - heading "The \"Hidden CMD Window\" Problem" [level=2] [ref=e159]
            - paragraph [ref=e160]: "This is where most Go Windows apps fall apart. Two issues:"
            - heading "1. Main app opens a console window" [level=3] [ref=e161]
            - paragraph [ref=e162]:
              - text: By default,
              - code [ref=e163]: go build
              - text: "produces a console application. When you double-click the EXE, Windows shows a console window. The fix is the linker flag:"
            - code [ref=e165]: go build -ldflags "-H windowsgui" -o driver-booster.exe .
            - paragraph [ref=e166]:
              - code [ref=e167]: "-H windowsgui"
              - text: tells the PE header to use the Windows GUI subsystem — no console, no flash.
            - heading "2. Subprocess calls (PowerShell) flash a window" [level=3] [ref=e168]
            - paragraph [ref=e169]:
              - text: Every
              - code [ref=e170]: exec.Command("powershell", ...)
              - text: call pops up a CMD window briefly. The fix is setting
              - code [ref=e171]: SysProcAttr
              - text: ":"
            - code [ref=e173]: "func HiddenCommand(name string, args ...string) *exec.Cmd { cmd := exec.Command(name, args...) cmd.SysProcAttr = &syscall.SysProcAttr{ CreationFlags: 0x08000000, // CREATE_NO_WINDOW } return cmd }"
            - paragraph [ref=e174]:
              - text: The
              - code [ref=e175]: CREATE_NO_WINDOW
              - text: flag prevents the console window from ever being created for the child process.
            - 'heading "Making It Look Native: Frameless Window" [level=2] [ref=e176]'
            - paragraph [ref=e177]:
              - text: "WebView2's default window has a native Windows title bar. That's fine, but I wanted a custom title bar with a status indicator and brand colors. The trick: remove"
              - code [ref=e178]: WS_CAPTION
              - text: from the window style via Win32 API.
            - code [ref=e180]: "var ( user32 = syscall.NewLazyDLL(\"user32.dll\") procGetWindowLong = user32.NewProc(\"GetWindowLongW\") procSetWindowLong = user32.NewProc(\"SetWindowLongW\") procSetWindowPos = user32.NewProc(\"SetWindowPos\") ) func removeWindowFrame(hwnd uintptr) { gwlStyle := uintptr(0xFFFFFFF0) // GWL_STYLE = -16 as unsigned style, _, _ := procGetWindowLong.Call(hwnd, gwlStyle) newStyle := (style &^ 0x00C00000) | 0x00040000 // remove WS_CAPTION, keep WS_THICKFRAME procSetWindowLong.Call(hwnd, gwlStyle, newStyle) procSetWindowPos.Call(hwnd, 0, 0, 0, 0, 0, 0x0020|0x0002|0x0001|0x0004) }"
            - paragraph [ref=e181]:
              - text: After creating the WebView2 window, I grab its
              - code [ref=e182]: HWND
              - text: via
              - code [ref=e183]: w.Window()
              - text: and call
              - code [ref=e184]: removeWindowFrame()
              - text: . The native title bar vanishes but the window stays resizable because
              - code [ref=e185]: WS_THICKFRAME
              - text: is preserved.
            - heading "Custom window controls" [level=3] [ref=e186]
            - paragraph [ref=e187]:
              - text: With the title bar gone, I need my own min/max/close buttons. I bind Go functions to
              - link "JavaScript" [ref=e188] [cursor=pointer]:
                - /url: /latest-javascript-framework-updates-react-vue-and-angular
              - text: ":"
            - code [ref=e190]: "w.Bind(\"windowMinimize\", func() { procPostMessage.Call(hwnd, 0x0112, 0xF020, 0) // WM_SYSCOMMAND + SC_MINIMIZE }) w.Bind(\"windowClose\", func() { procPostMessage.Call(hwnd, 0x0112, 0xF060, 0) // SC_CLOSE })"
            - paragraph [ref=e191]: "In HTML:"
            - code [ref=e193]:
              - button "✕" [ref=e194] [cursor=pointer]
            - heading "Making the title bar draggable" [level=3] [ref=e195]
            - paragraph [ref=e196]:
              - text: You might think
              - code [ref=e197]: "-webkit-app-region: drag"
              - text: "CSS works. It does not — that's an Electron-specific property. In WebView2, you need the Win32 message trick:"
            - code [ref=e199]: "w.Bind(\"windowDrag\", func() { procReleaseCapture.Call() procSendMessage.Call(hwnd, 0x00A1, 2, 0) // WM_NCLBUTTONDOWN, HTCAPTION })"
            - paragraph [ref=e200]: "Then on the title bar:"
            - code [ref=e202]:
              - generic [ref=e203]: ...
            - paragraph [ref=e204]:
              - text: When you mousedown on the title bar, we tell Windows
              - emphasis [ref=e205]: "\"this click is actually on a caption area\""
              - text: ", and Windows handles the drag natively. The window moves with the cursor exactly like a normal app — including snapping to screen edges."
            - heading "Collecting System Info via Win32 API" [level=2] [ref=e206]
            - paragraph [ref=e207]: "For RAM, disk, and OS version, I used direct syscalls instead of PowerShell for speed and accuracy:"
            - code [ref=e209]: var ( kernel32 = syscall.NewLazyDLL("kernel32.dll") procGlobalMemoryEx = kernel32.NewProc("GlobalMemoryStatusEx") ntdll = syscall.NewLazyDLL("ntdll.dll") procRtlGetVersion = ntdll.NewProc("RtlGetVersion") ) var mem memoryStatusEx mem.Length = uint32(unsafe.Sizeof(mem)) procGlobalMemoryEx.Call(uintptr(unsafe.Pointer(&mem)))
            - paragraph [ref=e210]:
              - strong [ref=e211]:
                - text: Why
                - code [ref=e212]: RtlGetVersion
                - text: instead of
                - code [ref=e213]: GetVersion
                - text: "?"
              - text: Because Windows lies.
              - code [ref=e214]: GetVersion
              - text: returns whatever the app manifest claims — it's subject to compatibility shims.
              - code [ref=e215]: RtlGetVersion
              - text: from
              - code [ref=e216]: ntdll.dll
              - text: always returns the true version, which matters for a system utility.
            - img "System Information Tab"
            - heading "Driver Enumeration via WMI" [level=2] [ref=e217]
            - paragraph [ref=e218]: "For drivers, I punted to PowerShell because calling SetupAPI from Go is painful. This one-liner gives me everything I need:"
            - code [ref=e220]: "Get-CimInstance Win32_PnPSignedDriver | Where-Object { $_.DeviceName -ne $null } | Select-Object DeviceName, DeviceClass, Manufacturer, DriverVersion, DriverDate, InfName, IsSigned, Status | ConvertTo-Json -Compress"
            - paragraph [ref=e221]:
              - text: Go executes this via
              - code [ref=e222]: HiddenCommand()
              - text: ", parses the JSON, and renders it to the UI. Each driver gets a contextual icon based on its"
              - code [ref=e223]: DeviceClass
              - text: — monitor for displays, wifi for network adapters, cpu for processors, etc.
            - img "Driver List with Action Buttons"
            - heading "Windows Update via COM" [level=2] [ref=e224]
            - paragraph [ref=e225]: "For checking updates, I use the Windows Update Agent COM API (also via PowerShell):"
            - code [ref=e227]: $Session = New-Object -ComObject Microsoft.Update.Session $Searcher = $Session.CreateUpdateSearcher() $SearchResult = $Searcher.Search("IsInstalled=0")
            - paragraph [ref=e228]: This returns pending updates with KB article IDs, categories, download sizes, and severity — everything the UI shows.
            - img "Windows Update Checker"
            - heading "WinUI3 Dark Theme in CSS" [level=2] [ref=e229]
            - paragraph [ref=e230]: "To match Windows 11's design language, I used the Mica palette as CSS variables:"
            - code [ref=e232]: ":root { --bg: #202020; /* Mica dark base */ --surface: #2d2d2d; --card: #323232; --border: rgba(255,255,255,0.0578); --accent: #60cdff; /* Win11 accent */ --accent-bg: #0078d4; --text: #ffffffde; } body { font-family: 'Segoe UI Variable', 'Segoe UI'; }"
            - paragraph [ref=e233]: These values come straight from the WinUI3 design tokens. The result looks like a first-party Microsoft app — Settings, PC Manager, that kind of vibe.
            - heading "Embedding the App Icon" [level=2] [ref=e234]
            - paragraph [ref=e235]:
              - text: For the EXE icon (shown in taskbar, Explorer, ALT+TAB), I used
              - link "go-winres" [ref=e236] [cursor=pointer]:
                - /url: https://github.com/tc-hib/go-winres
              - text: ":"
            - code [ref=e238]: "go install github.com/tc-hib/go-winres@latest go-winres init # place icon.png in winres/ and edit winres/winres.json go-winres make go build -ldflags \"-H windowsgui\" -o driver-booster.exe ."
            - paragraph [ref=e239]:
              - code [ref=e240]: go-winres make
              - text: generates
              - code [ref=e241]: .syso
              - text: files that the Go linker automatically embeds. Right-click the EXE and you'll see proper Version, Company Name, and Description metadata.
            - heading "Lessons Learned" [level=2] [ref=e242]
            - list [ref=e243]:
              - listitem [ref=e244]:
                - strong [ref=e245]: WebView2 is excellent
                - text: for this kind of app — fast, stable, and preinstalled on modern Windows
              - listitem [ref=e246]:
                - strong [ref=e247]: Don't fight Win32
                - text: — for a truly native look, you need direct API calls
              - listitem [ref=e248]:
                - strong [ref=e249]: PowerShell is a fine escape hatch
                - text: for WMI/COM complexity — just hide the console window
              - listitem [ref=e250]:
                - strong [ref=e251]: Go embed changed the game
                - text: — no more asset management pain
              - listitem [ref=e252]:
                - strong [ref=e253]: 10 MB beats 150 MB
                - text: — Electron tax is real, and users notice
