            - heading "The problem with bundled web stacks" [level=2] [ref=e147]
            - paragraph [ref=e148]:
              - text: Every popular
              - link "Windows" [ref=e149] [cursor=pointer]:
                - /url: /building-windows-11-desktop-app-go-webview2
              - text: "web stack ships the same way: a single fat installer that drops Apache, PHP, MySQL, phpMyAdmin, and a control panel into one folder. That model made sense in 2003, when bandwidth was scarce and \"download once, install offline\" was a virtue. It does not age well."
            - paragraph [ref=e150]: "Here's what bundled stacks get wrong in 2026:"
            - paragraph [ref=e151]:
              - strong [ref=e152]: Versions go stale fast.
              - text: The XAMPP installer for PHP 8.5 took months to land after the upstream release. If you need PHP 8.5.5 today and the bundled version is 8.5.0, you're patching by hand and breaking the stack manager's expectations along the way.
            - paragraph [ref=e153]:
              - strong [ref=e154]: You pay for software you'll never run.
              - text: A typical stack includes Mercury Mail, Tomcat, FileZilla, and a Perl interpreter. I have not started Mercury Mail this decade. The disk footprint is real and the maintenance surface is larger than what I'm actually using.
            - paragraph [ref=e155]:
              - strong [ref=e156]: The control panel is fragile.
              - text: XAMPP's panel is a Delphi VCL app that tracks pid files. When Apache crashes mid-startup and the pid file is stale, the panel's status display gets stuck and the only fix is a reboot. Laragon handles this better but still ships with side-cars I don't need.
            - paragraph [ref=e157]:
              - strong [ref=e158]: Admin rights bleed everywhere.
              - text: The installer wants admin to write to
              - code [ref=e159]: Program Files
              - text: . The service starter wants admin to bind port 80. The hosts-file editor wants admin again. Each step is a UAC prompt.
            - paragraph [ref=e160]:
              - text: "GoAMPP picks a different model:"
              - strong [ref=e161]: ship the control panel, fetch the services
              - text: . The 7 MB executable knows about Apache, Nginx, MariaDB, PostgreSQL, Redis, PHP-FPM, phpMyAdmin, and Adminer. Click Start on any of them and the app downloads the upstream zip from the official source — Apache Lounge, nginx.org, archive.mariadb.org, EnterpriseDB — extracts it to
              - code [ref=e162]: bin/<service>/
              - text: ", runs whatever post-install setup the service needs, and starts the process. First-time install for the entire stack is around six minutes on coffee-shop wifi."
            - heading "The architecture in 30 seconds" [level=2] [ref=e163]
            - paragraph [ref=e164]:
              - text: GoAMPP is a single Go binary built with
              - code [ref=e165]: "-ldflags=\"-H windowsgui -s -w\""
              - text: so it has no console window and is stripped down to ~7 MB. The GUI uses
              - link "windigo" [ref=e166] [cursor=pointer]:
                - /url: https://github.com/rodrigocfd/windigo
              - text: ", a pure-Go binding for the Win32 widget set. No CGO. No webview. No Electron. Just"
              - code [ref=e167]: go build
              - text: and an exe.
            - paragraph [ref=e168]: "The codebase is roughly 6,000 lines split across these files:"
            - list [ref=e169]:
              - listitem [ref=e170]:
                - code [ref=e171]: main.go
                - text: — entry point, window creation, message loop
              - listitem [ref=e172]:
                - code [ref=e173]: service.go
                - text: — process lifecycle (start, stop, log capture, port checking)
              - listitem [ref=e174]:
                - code [ref=e175]: download.go
                - text: — service catalog and download/extract pipeline
              - listitem [ref=e176]:
                - code [ref=e177]: frameworks.go
                - text: — framework scaffolders (Laravel, Next.js, Spring Boot, etc.)
              - listitem [ref=e178]:
                - code [ref=e179]: vhost.go
                - text: — virtual host config writers (Apache + Nginx + Windows hosts file)
              - listitem [ref=e180]:
                - code [ref=e181]: tray.go
                - text: — system tray icon and popup menu
              - listitem [ref=e182]:
                - code [ref=e183]: ui_tabs.go
                - text: — pages (Services,
                - link "Projects" [ref=e184] [cursor=pointer]:
                  - /url: /machine-learning-projects-beginner-to-pro-ideas-examples
                - text: ", Editor, Vhosts, Settings)"
              - listitem [ref=e185]:
                - code [ref=e186]: icons.go
                - text: — service logo loading via
                - code [ref=e187]: LoadImage
                - text: +
                - code [ref=e188]: STM_SETICON
              - listitem [ref=e189]:
                - code [ref=e190]: paint.go
                - text: — owner-drawn coloured buttons (greeen Start, red Stop, blue Conf)
              - listitem [ref=e191]:
                - code [ref=e192]: pathenv.go
                - text: — "Add tools to PATH" via HKCU registry +
                - code [ref=e193]: WM_SETTINGCHANGE
              - listitem [ref=e194]:
                - code [ref=e195]: zombies.go
                - text: — startup sweep that kills stale
                - code [ref=e196]: bin/*
                - text: processes
              - listitem [ref=e197]:
                - code [ref=e198]: config.go
                - text: — JSON load/save for
                - code [ref=e199]: config.json
            - paragraph [ref=e200]: "Each service in the catalog is a struct describing how to fetch and install it:"
            - generic [ref=e201]:
              - generic [ref=e207]: Go
              - code [ref=e208]: "\"Apache\": { Version: \"2.4.66 (VS18, win64)\", URL: \"https://www.apachelounge.com/download/VS18/binaries/httpd-2.4.66-260223-Win64-VS18.zip\", InstallDir: \"bin/apache\", StripTop: \"Apache24/\", Kind: \"zip\", CheckFile: \"bin/httpd.exe\", PostInstall: func(installDir string, log func(string)) error { // patch httpd.conf — fix SRVROOT, ServerName, mod_cgi, vhost include }, },"
              - button "Copy" [ref=e209] [cursor=pointer]
            - paragraph [ref=e210]:
              - code [ref=e211]: StripTop
              - text: is the top-level
              - link "directory" [ref=e212] [cursor=pointer]:
                - /url: /awesome-selfhosted-picks-curated-directory-of-60-self-hostable-open-source-projects
              - text: inside the archive that we want to flatten. Apache Lounge's zip wraps everything in
              - code [ref=e213]: Apache24/
              - text: ", so stripping that prefix means"
              - code [ref=e214]: Apache24/bin/httpd.exe
              - text: lands at
              - code [ref=e215]: bin/apache/bin/httpd.exe
              - text: instead of
              - code [ref=e216]: bin/apache/Apache24/bin/httpd.exe
              - text: . Small thing, but it keeps every install path predictable.
            - paragraph [ref=e217]:
              - code [ref=e218]: PostInstall
              - text: runs after extraction and is where most of the per-service quirks live. For Apache the hook patches httpd.conf to fix the hardcoded
              - code [ref=e219]: Define SRVROOT "C:/Apache24"
              - text: and uncomment
              - code [ref=e220]: ServerName localhost:80
              - text: . For MariaDB it runs
              - code [ref=e221]: mariadb-install-db.exe
              - text: to seed the data directory. For PHP it copies
              - code [ref=e222]: php.ini-development
              - text: to
