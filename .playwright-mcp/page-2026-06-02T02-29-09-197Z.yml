            - paragraph [ref=e110]:
              - text: I have a confession. Every time I install XAMPP on a new machine, I lose about an hour to the same ritual — downloading the 200 MB installer, clicking past the Skype port-80 warning, fighting the control panel that hangs whenever Apache crashes mid-startup, and finally remembering that the Bitnami stack manager wants admin rights for
              - emphasis [ref=e111]: everything
              - text: . Laragon is friendlier, but it bundles Cmder and a dozen extras I never touch. WAMP is dated.
              - link "Docker" [ref=e112] [cursor=pointer]:
                - /url: /portainer-docker-management-simplify-container-ops-in-your-homelab
              - text: Desktop is a 2 GB hammer for a problem the size of a thumbtack.
            - paragraph [ref=e113]:
              - text: So one weekend I wrote my own.
              - strong [ref=e114]: GoAMPP
              - text: is a single-binary, native Win32 control panel that downloads Apache, MariaDB, PHP, and the rest
              - strong [ref=e115]: on demand
              - text: — no installer bloat, no preinstalled bin trees, no "wizard" with eight Next buttons. The shipped executable is 7 MB. After you click Install on the services you actually use, the disk footprint matches what you'd expect a LAMP stack to weigh.
            - paragraph [ref=e116]: This article walks through the design choices, the bugs I lost evenings to, and how the install + first-run flow looks today. If you came here looking for an alternative to XAMPP that respects your disk and your patience, you're in the right place.
