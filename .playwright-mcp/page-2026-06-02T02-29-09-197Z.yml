              - text: and uncomments the extensions phpMyAdmin needs.
            - heading "Designed for one keystroke, not ten" [level=2] [ref=e224]
            - paragraph [ref=e225]: "The control panel is the part you see, so let's start there. Every service renders as a card with its own logo, status line, version, and four action buttons sitting right inside the card:"
            - paragraph [ref=e226]:
              - img "alt text"
            - paragraph [ref=e227]: I went back and forth on the layout. The first version was a XAMPP-style table with one selection bar at the bottom and a single set of action buttons that operated on whichever row you'd clicked. That's fine when you have five services. With twelve cards on screen, every action becomes a two-step dance — click the row, then click the action — and the cognitive load adds up.
            - paragraph [ref=e228]: Per-card buttons cut the click count in half and remove the entire concept of a "selected service". Each card's button click handler captures the source service index in a closure, so I never need a "currently selected" lookup. The downside is more widgets to lay out by hand. The win is that the UI feels direct.
            - paragraph [ref=e229]:
              - text: "Below the grid sit three global buttons:"
              - strong [ref=e230]: Start Stack
              - text: ","
              - strong [ref=e231]: Stop All
              - text: ", and"
              - strong [ref=e232]: Restart Stack
              - text: ". Start Stack only boots the essentials a developer needs to serve PHP — Apache, MariaDB, and phpMyAdmin. Postgres, Redis, and Nginx stay manual. The reasoning: if I open GoAMPP at 9 AM and a Postgres process is still listening on 5432 from yesterday's experiment, the last thing I want is for \"Start Stack\" to silently relaunch it."
            - heading "How auto-install actually works" [level=2] [ref=e233]
            - paragraph [ref=e234]:
              - img "image"
              - text: When you click
              - strong [ref=e235]: Start
              - text: "on a service whose binary isn't on disk yet, the flow is:"
            - list [ref=e236]:
              - listitem [ref=e237]: The control panel checks its built-in catalog for a download URL keyed on the service name.
              - listitem [ref=e238]: The HTTP fetch happens in a goroutine so the UI stays responsive. A progress bar at the bottom of the window fills as bytes arrive. The log panel shows percent-complete updates roughly once a second.
              - listitem [ref=e239]:
                - text: The zip lands in
                - code [ref=e240]: downloads/
                - text: (cached, so a re-install skips the network). It's extracted into
                - code [ref=e241]: bin/<service>/
                - text: ", with optional top-level folder stripping."
              - listitem [ref=e242]: A per-service post-install hook runs.
              - listitem [ref=e243]: The service starts. If anything goes wrong, the process's stdout and stderr are piped into the log panel verbatim.
            - paragraph [ref=e244]:
              - text: The cache layer is important. If you uninstall a service and reinstall it later, the second install runs entirely from disk — no network round trip. The
              - code [ref=e245]: downloads/
              - text: directory is gitignored and can be wiped from the Settings page if you want to reclaim space.
            - paragraph [ref=e246]:
              - text: The download progress fires through a
              - code [ref=e247]: ProgressFunc
              - text: callback that the UI uses to drive a
              - code [ref=e248]: ProgressBar
              - text: widget at ~30 Hz. Text logging fires at 1 Hz in parallel because writing to a multi-line
              - code [ref=e249]: Edit
              - text: control is expensive — every line is a full
              - code [ref=e250]: WM_SETTEXT
              - text: round trip. The two channels are independent so the visual progress bar stays smooth even when the log can't keep up.
            - paragraph [ref=e251]:
              - text: The catalog also covers four language runtimes — Node.js LTS,
              - link "Python" [ref=e252] [cursor=pointer]:
                - /url: /reasonix-deepseek-native-agent-framework-cache-first-loop-r1-thought-harvesti
              - text: embeddable, Go, and Eclipse Temurin JDK 21. Same flow, same UI. After Python extracts, the post-install bootstraps
              - code [ref=e253]: pip
              - text: from
              - code [ref=e254]: bootstrap.pypa.io
              - text: so you can
              - code [ref=e255]: pip install flask
              - text: immediately without an extra step.
            - heading "The Apache bug I lost an evening to" [level=2] [ref=e256]
            - paragraph [ref=e257]: This one's worth its own section because it's the kind of bug that doesn't show up on Linux at all.
            - paragraph [ref=e258]:
              - text: The first version of GoAMPP used
              - code [ref=e259]: mod_proxy_fcgi
              - text: "with the standard idiom:"
            - generic [ref=e260]:
              - generic [ref=e266]: Apache
              - code [ref=e267]: <FilesMatch \.php$> SetHandler "proxy:fcgi://127.0.0.1:9000" </FilesMatch>
              - button "Copy" [ref=e268] [cursor=pointer]
            - paragraph [ref=e269]:
              - text: Apache logs the script's full filesystem path in the upstream URL. On Linux that produces something sane like
              - code [ref=e270]: fcgi://127.0.0.1:9000/var/www/script.php
              - text: . On Windows, the script path includes a drive letter (
              - code [ref=e271]: C:/...
              - text: "), and Apache concatenates without inserting a slash:"
            - generic [ref=e272]:
              - code [ref=e278]: fcgi://127.0.0.1:9000 + C:/Users/.../script.php = fcgi://127.0.0.1:9000C:/Users/.../script.php
              - button "Copy" [ref=e279] [cursor=pointer]
            - paragraph [ref=e280]:
              - text: The proxy URL parser then sees host=
              - code [ref=e281]: 127.0.0.1
              - text: ", port="
              - code [ref=e282]: 9000C
              - text: ", path="
              - code [ref=e283]: /Users/...
              - text: ", and the DNS resolver loses its mind:"
            - generic [ref=e284]:
              - code [ref=e290]: "AH00898: DNS lookup failure for: 127.0.0.1:9000c"
              - button "Copy" [ref=e291] [cursor=pointer]
            - paragraph [ref=e292]:
              - text: This is
              - strong [ref=e293]: Apache bug 55345
              - text: ", open since 2013. The workaround in the bug comments is to use"
              - code [ref=e294]: ProxyPassMatch
              - text: with the docroot baked into the URL, but I tested that route and PHP-CGI then complained "No input file specified" because the SCRIPT_FILENAME ended up with a leading slash that Windows refused to resolve.
            - paragraph [ref=e295]:
              - text: The fix that actually works is to abandon FastCGI and use
              - code [ref=e296]: mod_cgi
              - text: +
              - code [ref=e297]: mod_actions
              - text: with a
              - code [ref=e298]: ScriptAlias
              - text: pointing at
              - code [ref=e299]: php-cgi.exe
              - text: "directly. It's the classic CGI approach XAMPP has used for fifteen years. Slightly slower per request than FastCGI but bulletproof on Windows because there's no proxy URL to construct in the first place:"
            - generic [ref=e300]:
              - generic [ref=e306]: Apache
              - code [ref=e307]: LoadModule cgi_module modules/mod_cgi.so LoadModule actions_module modules/mod_actions.so ScriptAlias "/__goampp-php-bin__/" "C:/.../bin/php/" <Directory "C:/.../bin/php"> AllowOverride None Options +ExecCGI Require all granted </Directory> AddHandler application/x-httpd-php .php Action application/x-httpd-php "/__goampp-php-bin__/php-cgi.exe"
              - button "Copy" [ref=e308] [cursor=pointer]
            - paragraph [ref=e309]:
              - text: "Lesson learned: when a Windows Apache config uses"
              - code [ref=e310]: proxy:fcgi://
              - text: ", run"
              - code [ref=e311]: tail -f error_log
              - text: and look for
              - code [ref=e312]: 9000c
              - text: (or similar suffixed-port nonsense) in the DNS error messages. It's never your firewall.
            - heading "Process management on Windows is harder than it looks" [level=2] [ref=e313]
            - paragraph [ref=e314]:
              - text: The first time I clicked Stop on Apache, the process exited and the log said
              - code [ref=e315]: "[Apache] exited cleanly"
              - text: . Two seconds later I clicked Start again and got
              - code [ref=e316]: port 80 already in use
              - text: . Reboot. Repeat. The bug took a while to find.
            - paragraph [ref=e317]:
              - text: "Here's what was happening: Apache's"
              - code [ref=e318]: winnt
              - text: MPM forks a worker child. When you call
              - code [ref=e319]: cmd.Process.Kill()
              - text: on the parent, the child keeps running because Windows doesn't have process groups in the POSIX sense. The orphaned worker holds the listening socket on port 80 until you manually kill it via Task Manager.
            - paragraph [ref=e320]:
              - text: "Fix: use"
              - code [ref=e321]: taskkill /F /T /PID <pid>
              - text: instead. The
              - code [ref=e322]: /T
              - text: flag ("kill tree") nukes the parent and every descendant in one shot. Since GoAMPP launches services with a known parent PID, the tree kill catches the worker too. The Stop button now reliably frees the port.
            - paragraph [ref=e323]:
              - text: I also added a startup sweep that walks all processes via PowerShell and kills anything whose image path is inside
              - code [ref=e324]: <goampp>/bin/
              - text: . That cleans up zombies left from prior crashes — say, when Apache died because httpd.conf had a syntax error and the worker was already running. Without the sweep, the next launch would hit "port 80 in use" and look broken to anyone who didn't check Task Manager first.
            - paragraph [ref=e325]:
              - text: I originally wrote the sweep using
              - code [ref=e326]: wmic
              - text: ", but"
              - link "Windows 11" [ref=e327] [cursor=pointer]:
                - /url: /ghosthardware-2026-stable-kernel-mode-hwid-spoofing-for-windows-11
              - text: "22H2+ removed it from the default install. PowerShell ships with every modern Windows so it's a safer dependency:"
            - generic [ref=e328]:
              - generic [ref=e334]: Go
              - code [ref=e335]: "script := `Get-Process | Where-Object { $_.Path } | ForEach-Object { \"$($_.Id)|$($_.Path)\" }` cmd := exec.Command(\"powershell.exe\", \"-NoProfile\", \"-NonInteractive\", \"-Command\", script)"
              - button "Copy" [ref=e336] [cursor=pointer]
            - paragraph [ref=e337]:
              - text: The output is parsed line-by-line (
              - code [ref=e338]: <pid>|<absolute path>
              - text: ), filtered to paths starting with the goampp
              - code [ref=e339]: bin/
              - text: directory, and each match is
              - code [ref=e340]: taskkill /F /T
              - text: "'d. Logged so you can see which zombies got cleaned up at startup."
            - heading "Frameworks that scaffold themselves" [level=2] [ref=e341]
            - paragraph [ref=e342]:
              - text: The Projects tab takes the auto-install idea one level higher. Pick a framework from a dropdown — Laravel, Symfony, WordPress, Next.js, Express, NestJS, AdonisJS, Vite + React, Flask, Django, FastAPI, Gin, Spring Boot, or a static HTML starter — type a project name, pick a
              - code [ref=e343]: .test
              - text: domain, and click
              - strong [ref=e344]: Create Project
              - text: .
            - paragraph [ref=e345]:
              - text: What happens next depends on the framework. PHP
              - link "frameworks" [ref=e346] [cursor=pointer]:
                - /url: /latest-javascript-framework-updates-react-vue-and-angular
              - text: run through Composer, which GoAMPP downloads on first use from
              - code [ref=e347]: getcomposer.org
              - text: . Node frameworks invoke
              - code [ref=e348]: npx
              - text: via the bundled Node binary. Python projects pip-install their dependencies and drop a starter
              - code [ref=e349]: app.py
              - text: . Spring Boot projects fetch a generated zip from
              - code [ref=e350]: start.spring.io
              - text: with sensible defaults (web + devtools). Static HTML gets a one-page boilerplate.
            - paragraph [ref=e351]:
              - text: Once the scaffold finishes, the project is registered both in
              - code [ref=e352]: config.json
              - text: and as an Apache virtual host. The hosts file (
              - code [ref=e353]: C:\Windows\System32\drivers\etc\hosts
              - text: ) gets a managed block with the new domain pointing at 127.0.0.1, and
              - code [ref=e354]: conf/apache/vhosts.conf
              - text: gets a
              - code [ref=e355]: <VirtualHost>
              - text: block pointing at the project's docroot.
            - paragraph [ref=e356]:
              - text: For Node, Python, Go, and Java frameworks — which ship their own dev servers — GoAMPP emits a
              - code [ref=e357]: ProxyPass
              - text: block instead of a
              - code [ref=e358]: DocumentRoot
              - text: ":"
            - generic [ref=e359]:
              - generic [ref=e365]: Apache
              - code [ref=e366]: <VirtualHost *:80> ServerName myapp.test ProxyPreserveHost On ProxyPass / http://127.0.0.1:3000/ ProxyPassReverse / http://127.0.0.1:3000/ </VirtualHost>
              - button "Copy" [ref=e367] [cursor=pointer]
            - paragraph [ref=e368]:
              - text: So
              - code [ref=e369]: myapp.test
              - text: reverse-proxies to your
              - code [ref=e370]: npm run dev
              - text: /
              - code [ref=e371]: flask run
              - text: /
              - code [ref=e372]: go run .
              - text: while you work in a terminal. You get nice hostname URLs without the framework needing to know about hosts file mapping.
            - heading "The XAMPP comparison nobody asked for" [level=2] [ref=e373]
            - paragraph [ref=e374]: I'll be blunt. XAMPP is software written for an older era and it shows. The download is 200 MB. The default install runs as a privileged service. The control panel is brittle. PHP 8.5 took the Bitnami team months to ship after upstream. There is no graceful path to add Node, Python, or Go to the same workflow.
            - paragraph [ref=e375]: Laragon is genuinely better — fast quick-app menu, easy auto-vhost, sensible defaults. But it's also 100 MB, ships with Cmder and a Telegram desktop notification helper I cannot remember enabling, and the source is closed.
            - paragraph [ref=e376]: GoAMPP is 7 MB, the source is on GitHub under a permissive license, and the entire control panel is one Go binary you can read end to end in an afternoon. I am not pretending it has feature parity with either incumbent today. Mercury Mail is gone. Tomcat is gone. The Apache build is whatever Apache Lounge published last week, not whatever Bitnami patched in 2024.
            - paragraph [ref=e377]: If your stack is PHP plus a database plus phpMyAdmin, the trade is favorable. If you live inside Tomcat, install XAMPP and be happy.
            - heading "Getting started" [level=2] [ref=e378]
            - paragraph [ref=e379]:
              - text: The release page on GitHub has a single Inno Setup installer —
              - code [ref=e380]: goampp-setup-0.4.0.exe
              - text: at 5.4 MB. Double-click, accept the per-user install location (
              - code [ref=e381]: "%LOCALAPPDATA%\\GoAMPP"
              - text: ), and the wizard finishes in three seconds. Launch the app, click any service card's
              - strong [ref=e382]: Start
              - text: button, wait for the download, and you're serving traffic.
            - paragraph [ref=e383]: "If you want to build from source:"
            - generic [ref=e384]:
              - generic [ref=e390]: Terminal
              - code [ref=e391]: git clone https://github.com/imtaqin/goampp cd goampp go build -ldflags="-H windowsgui -s -w" -o goampp.exe .
              - button "Copy" [ref=e392] [cursor=pointer]
            - paragraph [ref=e393]:
              - text: The repository is plain Go with one external dependency (the
              - code [ref=e394]: windigo
              - text: Win32 binding library). No CGO, no
              - code [ref=e395]: gcc
              - text: ", no"
              - code [ref=e396]: make
              - text: .
            - heading "Frequently asked questions" [level=2] [ref=e397]
            - heading "Is GoAMPP a port of XAMPP?" [level=3] [ref=e398]
            - paragraph [ref=e399]:
              - text: No. It's a from-scratch control panel written in Go, with no shared code. The catalog of services it manages overlaps with XAMPP because the popular
              - link "open-source" [ref=e400] [cursor=pointer]:
                - /url: /ghosthardware-2026-stable-kernel-mode-hwid-spoofing-for-windows-11
              - text: web stack doesn't change much, but everything else — UI, process management, install flow — is independent.
            - heading "Can I run it alongside an existing XAMPP install?" [level=3] [ref=e401]
            - paragraph [ref=e402]:
              - text: Yes, as long as the ports don't collide. GoAMPP installs to
              - code [ref=e403]: "%LOCALAPPDATA%\\GoAMPP"
              - text: and downloads its own copies of Apache, MariaDB, etc. into its own bin tree. If XAMPP is already serving on port 80, GoAMPP's Apache won't start until you change one of the two
              - code [ref=e404]: Listen
              - text: directives.
            - heading "Does it work on Windows 10?" [level=3] [ref=e405]
            - paragraph [ref=e406]: Yes. The minimum is Windows 10 build 1809 (the first version that ships PowerShell 5.1 and a usable Common Controls v6 runtime). Windows 11 is the primary development target.
            - heading "What about Linux or macOS?" [level=3] [ref=e407]
            - paragraph [ref=e408]:
              - text: GoAMPP is Windows-only by design. The whole point is native Win32 widgets without a runtime, which doesn't translate. If you need a similar tool on Linux, look at
              - link "DDEV" [ref=e409] [cursor=pointer]:
                - /url: https://ddev.com/
              - text: ; on macOS, look at
              - link "Herd" [ref=e410] [cursor=pointer]:
                - /url: https://herd.laravel.com/
              - text: .
            - heading "Is it safe to run with admin rights all the time?" [level=3] [ref=e411]
            - paragraph [ref=e412]:
              - text: Functionally yes, but I'd avoid it. Run elevated only when you're applying virtual host changes; otherwise the per-user install model gives you a cleaner uninstall and zero risk to the rest of your system. The Settings page has a "Restart as Administrator" button that reads the current process token, fires
              - code [ref=e413]: ShellExecute
              - text: with the
              - code [ref=e414]: runas
              - text: verb, and exits the unelevated instance — one click instead of right-clicking the exe in Explorer.
            - heading "Where do project files live?" [level=3] [ref=e415]
            - paragraph [ref=e416]:
              - text: "Everything goes under the install dir:"
              - code [ref=e417]: bin/
              - text: for downloaded service binaries,
              - code [ref=e418]: www/
              - text: for project source,
              - code [ref=e419]: conf/
              - text: for generated vhost config,
              - code [ref=e420]: tmp/
              - text: for sessions and uploads,
              - code [ref=e421]: logs/
              - text: for service log output. The whole tree is portable — copy the install dir to another machine and it Just Works.
            - separator [ref=e422]
            - paragraph [ref=e423]:
              - text: The full source, the issue tracker, and the latest release live at
              - strong [ref=e424]:
                - link "github.com/imtaqin/goampp" [ref=e425] [cursor=pointer]:
                  - /url: https://github.com/imtaqin/goampp
              - text: . Pull requests welcome. Bug reports especially welcome — I write code on a single Windows 11 laptop and I am positive there are edge cases I have not seen.
