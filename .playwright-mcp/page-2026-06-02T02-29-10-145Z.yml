            - heading "Features" [level=2] [ref=e166]
            - heading "Ruqyah Reader" [level=3] [ref=e167]
            - list [ref=e168]:
              - listitem [ref=e169]: Curated ayahs from Al-Quran used for ruqyah syar'iyyah (self-healing)
              - listitem [ref=e170]: Arabic text with Uthmani script, Indonesian translation, and tajweed color coding
              - listitem [ref=e171]: Grouped by surah with decorative surah banners
              - listitem [ref=e172]: Per-ayah audio playback with Mishary Rashid Al-Afasy recitation
              - listitem [ref=e173]: Sequential auto-play with queue management
              - listitem [ref=e174]: Repeat counter per ayah for tracking practice
              - listitem [ref=e175]: Bookmark system for saving progress
            - heading "Al-Quran" [level=3] [ref=e176]
            - list [ref=e177]:
              - listitem [ref=e178]: Full 114 surah index with Arabic names, Latin transliteration, and verse counts
              - listitem [ref=e179]: Surah search functionality
              - listitem [ref=e180]: Per-ayah play buttons and auto-play from any verse
              - listitem [ref=e181]: Audio from cdn.islamic.network CDN (128kbps, Al-Afasy)
              - listitem [ref=e182]: Left-side slide-in audio panel
            - heading "Kumpulan Doa (Prayer Collection)" [level=3] [ref=e183]
            - list [ref=e184]:
              - listitem [ref=e185]: 6 ruqyah-specific prayers with hadith sources
              - listitem [ref=e186]: 15 daily prayers covering common situations
              - listitem [ref=e187]: Arabic text, Latin transliteration, Indonesian translation
              - listitem [ref=e188]: Collapsible cards for easy browsing
              - listitem [ref=e189]: Source references from Bukhari, Muslim, Abu Dawud, and other authenticated collections
            - heading "Qibla Compass" [level=3] [ref=e190]
            - list [ref=e191]:
              - listitem [ref=e192]:
                - text: Real-time
                - link "compass" [ref=e193] [cursor=pointer]:
                  - /url: /compass-self-hosted-tool-for-developers-and-homelabbers
                - text: using device orientation sensors
              - listitem [ref=e194]: Great-circle bearing calculation to the Kaaba
              - listitem [ref=e195]: Automatic geolocation with cached coordinates
              - listitem [ref=e196]: Visual compass needle with degree and cardinal direction display
            - heading "Prayer Times" [level=3] [ref=e197]
            - list [ref=e198]:
              - listitem [ref=e199]: Daily prayer schedule based on user geolocation
              - listitem [ref=e200]: Next prayer highlight
              - listitem [ref=e201]: Hijri and Gregorian date display
              - listitem [ref=e202]: Location detection with city name
            - heading "Additional Features" [level=3] [ref=e203]
            - list [ref=e204]:
              - listitem [ref=e205]: Dark and light theme with system-level toggle
              - listitem [ref=e206]: Multi-language support (Indonesian, English, Arabic)
              - listitem [ref=e207]: Offline capability via service worker and precaching
              - listitem [ref=e208]: Daily reading progress tracking (ayahs read, repetitions, streak)
              - listitem [ref=e209]: Note-taking with Supabase cloud sync
              - listitem [ref=e210]: Installable as a standalone app on mobile devices
