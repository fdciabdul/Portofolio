            - heading "Webhook Payload Example" [level=3] [ref=e451]
            - code [ref=e453]: "{ \"event\": \"message\", \"session_id\": \"my-session\", \"timestamp\": 1704067200, \"data\": { \"from\": \"628123456789@s.whatsapp.net\", \"message_id\": \"3EB0ABC123...\", \"type\": \"text\", \"body\": \"Hello!\" } }"
            - heading "Signature Verification" [level=3] [ref=e454]
            - paragraph [ref=e455]:
              - text: Every webhook includes an
              - code [ref=e456]: X-Signature
              - text: header — HMAC-SHA256 of the payload using your secret.
            - code [ref=e458]: "import hmac import hashlib def verify_signature(payload, signature, secret): expected = hmac.new( secret.encode(), payload.encode(), hashlib.sha256 ).hexdigest() return hmac.compare_digest(expected, signature)"
            - paragraph [ref=e459]: Verify it. Don't trust unverified webhooks.
            - heading "Register Webhook via API" [level=3] [ref=e460]
            - code [ref=e462]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/webhooks \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"url\": \"https://your-server.com/webhook\", \"secret\": \"your-webhook-secret\", \"events\": [\"message\", \"connected\"] }'"
