            - heading "Why Rust?" [level=2] [ref=e215]
            - paragraph [ref=e216]: I know, I know. "Rust is hard." "Just use Go."
            - paragraph [ref=e217]:
              - text: But here's the thing — Rust's
              - link "memory safety" [ref=e218] [cursor=pointer]:
                - /url: /rust-programming-language-why-it-s-the-future-of-systems-programming
              - text: isn't just a flex. When you're managing hundreds of WebSocket connections and encryption keys, you
              - emphasis [ref=e219]: need
              - text: guarantees.
            - paragraph [ref=e220]:
              - text: Plus, the
              - code [ref=e221]: whatsapp-rust
              - text: library exists. Someone already did the hard part of
              - link "reverse-engineering" [ref=e222] [cursor=pointer]:
                - /url: /auto-bid-bot-projects-co-id
              - text: the WhatsApp Web protocol. I just needed to wrap it in an API.
