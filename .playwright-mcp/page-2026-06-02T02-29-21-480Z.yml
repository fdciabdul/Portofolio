            - heading "Features That Actually Matter" [level=3] [ref=e258]
            - code [ref=e260]: ✓ Multi-session — Run 100+ WhatsApp accounts on one server ✓ QR Code & Pair Code — Two ways to link devices ✓ Rich Messages — Text, images, video, audio, docs, stickers, location ✓ Webhooks — Real-time events with HMAC-SHA256 signatures ✓ Web Dashboard — Visual management, no CLI needed ✓ Swagger UI — Test endpoints without Postman
            - separator [ref=e261]
            - heading "Getting Started (It's Stupid Simple)" [level=2] [ref=e262]
            - 'heading "Option 1: Docker (Recommended)" [level=3] [ref=e263]'
            - paragraph [ref=e264]:
              - text: Pull from
              - link "Docker" [ref=e265] [cursor=pointer]:
                - /url: /portainer-docker-management-simplify-container-ops-in-your-homelab
              - text: "Hub:"
            - code [ref=e267]: docker pull fdciabdul/wa-rs:latest
            - 'heading "Option 2: Docker Compose (Full Stack)" [level=3] [ref=e268]'
            - paragraph [ref=e269]:
              - text: Create a
              - code [ref=e270]: docker-compose.yml
              - text: ":"
            - code [ref=e272]: "services: wa-rs: image: fdciabdul/wa-rs:latest ports: - \"3451:3451\" environment: - POSTGRES_HOST=postgres - POSTGRES_PORT=5432 - POSTGRES_USER=postgres - POSTGRES_PASSWORD=postgres - POSTGRES_DB=wagateway - JWT_SECRET=change-this-in-production volumes: - wa_sessions:/app/whatsapp_sessions depends_on: - postgres postgres: image: postgres:16-alpine environment: - POSTGRES_USER=postgres - POSTGRES_PASSWORD=postgres - POSTGRES_DB=wagateway volumes: - pg_data:/var/lib/postgresql/data volumes: wa_sessions: pg_data:"
            - paragraph [ref=e273]: "Run it:"
            - code [ref=e275]: docker compose up -d
            - paragraph [ref=e276]:
              - text: That's it. Server running on
              - code [ref=e277]: http://localhost:3451
              - text: .
            - 'heading "Option 3: Build From Source" [level=3] [ref=e278]'
            - paragraph [ref=e279]: "For the masochists who want to compile themselves:"
            - code [ref=e281]: "# Clone the repo git clone https://github.com/fdciabdul/wa-rs.git cd wa-rs # Install Rust nightly (required) rustup default nightly # Set up your .env cp .env.example .env # Edit .env with your Postgres credentials # Build and run cargo run --release"
            - separator [ref=e282]
            - heading "The API" [level=2] [ref=e283]
            - paragraph [ref=e284]:
              - text: All endpoints require
              - link "authentication" [ref=e285] [cursor=pointer]:
                - /url: /authentik-sso
              - text: . Get your token first (see Authentication section below).
            - heading "Create a Session" [level=3] [ref=e286]
            - code [ref=e288]: "curl -X POST http://localhost:3451/api/v1/sessions \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"id\": \"my-session\", \"name\": \"My WhatsApp\", \"webhook\": { \"url\": \"https://your-server.com/webhook\", \"secret\": \"webhook-secret\", \"events\": [\"message\", \"connected\", \"disconnected\"] } }'"
            - heading "Connect a Session" [level=3] [ref=e289]
            - code [ref=e291]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/connect \\ -H \"Authorization: Bearer YOUR_TOKEN\""
            - heading "Get QR Code" [level=3] [ref=e292]
            - code [ref=e294]: "curl http://localhost:3451/api/v1/sessions/my-session/qr \\ -H \"Authorization: Bearer YOUR_TOKEN\""
            - paragraph [ref=e295]: Returns base64 PNG. Scan it with WhatsApp. Done.
            - heading "Get Pair Code (Alternative to QR)" [level=3] [ref=e296]
            - code [ref=e298]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/pair-code \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{\"phone\": \"628123456789\"}'"
            - paragraph [ref=e299]: Returns an 8-digit code. Enter it in WhatsApp → Settings → Linked Devices → Link with phone number.
            - heading "Send a Text Message" [level=3] [ref=e300]
            - code [ref=e302]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/text \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"text\": \"Hello from WA-RS!\" }'"
            - heading "Send an Image" [level=3] [ref=e303]
            - code [ref=e305]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/image \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"url\": \"https://example.com/image.jpg\", \"caption\": \"Check this out!\" }'"
            - heading "Send a Video" [level=3] [ref=e306]
            - code [ref=e308]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/video \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"url\": \"https://example.com/video.mp4\", \"caption\": \"Watch this\" }'"
            - heading "Send Audio" [level=3] [ref=e309]
            - code [ref=e311]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/audio \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"url\": \"https://example.com/audio.mp3\", \"ptt\": true }'"
            - paragraph [ref=e312]:
              - text: Set
              - code [ref=e313]: "ptt: true"
              - text: for voice note style,
              - code [ref=e314]: "false"
              - text: for regular audio file.
            - heading "Send a Document" [level=3] [ref=e315]
            - code [ref=e317]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/document \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"url\": \"https://example.com/document.pdf\", \"filename\": \"invoice.pdf\", \"caption\": \"Here is the invoice\" }'"
            - heading "Send a Sticker" [level=3] [ref=e318]
            - code [ref=e320]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/sticker \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"url\": \"https://example.com/sticker.webp\" }'"
            - heading "Send Location" [level=3] [ref=e321]
            - code [ref=e323]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/location \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"latitude\": -6.2088, \"longitude\": 106.8456, \"name\": \"Jakarta\", \"address\": \"Jakarta, Indonesia\" }'"
            - heading "Send Contact Card" [level=3] [ref=e324]
            - code [ref=e326]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/contact \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"contact\": { \"display_name\": \"John Doe\", \"phones\": [ {\"number\": \"+1234567890\", \"phone_type\": \"CELL\"} ] } }'"
            - heading "Edit a Message" [level=3] [ref=e327]
            - code [ref=e329]: "curl -X POST http://localhost:3451/api/v1/sessions/my-session/messages/edit \\ -H \"Authorization: Bearer YOUR_TOKEN\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"to\": \"628123456789\", \"message_id\": \"3EB0ABC123...\", \"text\": \"Updated message text\" }'"
            - heading "React to a Message" [level=3] [ref=e330]
