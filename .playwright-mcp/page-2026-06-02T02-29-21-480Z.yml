            - heading "Getting Your Token" [level=3] [ref=e388]
            - paragraph [ref=e389]: "On first startup, the server generates a superadmin token. Two ways to find it:"
            - paragraph [ref=e390]:
              - strong [ref=e391]: "Option 1: Check the logs"
            - code [ref=e393]: docker compose logs wa-rs | grep "SUPERADMIN"
            - paragraph [ref=e394]: "You'll see something like:"
            - code [ref=e396]: "┌─────────────────────────────────────────────────────────────┐ │ SUPERADMIN TOKEN │ ├─────────────────────────────────────────────────────────────┤ │ eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJzdXBlcmFkbWluIiwicm9sZSI... │ ├─────────────────────────────────────────────────────────────┤ │ Tip: Set SUPERADMIN_TOKEN in .env to use a fixed token │ └─────────────────────────────────────────────────────────────┘"
            - paragraph [ref=e397]:
              - strong [ref=e398]: "Option 2: Dashboard"
            - paragraph [ref=e399]:
              - text: Go to
              - code [ref=e400]: http://localhost:3451/dashboard/settings
              - text: — the token is right there.
            - heading "Using the Token" [level=3] [ref=e401]
            - paragraph [ref=e402]: "Include it in every API request:"
            - code [ref=e404]: "curl -H \"Authorization: Bearer eyJhbGciOiJIUzI1NiJ9...\" \\ http://localhost:3451/api/v1/sessions"
            - heading "Using Swagger UI" [level=3] [ref=e405]
